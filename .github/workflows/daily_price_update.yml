name: Daily price change update

on:
  # GitHub ActionsのIPからのkabutan.jpへのアクセスがブロックされるため、
  # 定期実行はローカル端末のスケジュールタスクに移行した。
  # このワークフローは手動実行(デバッグ用)にのみ残す。
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update price changes
        run: python scripts/fetch_price_changes.py

      - name: Fetch next-day session high/close
        run: python scripts/fetch_next_day_session.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/calendar_data.json docs/data/pts_detail_log.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily price change update"
            git push
          fi
